[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
sqlalchemy.url = postgresql://user:pass@localhost:5432/astrology

[post_write_hooks]
# Type of hooks to run
hooks = ruff

# Comma-separated list of files to format
ruff.files = alembic/versions/*.py

# ruff configuration
ruff.options = --config ruff.toml