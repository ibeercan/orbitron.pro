<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="coreGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="orbitGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#22d3ee" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.6"/>
    </linearGradient>
  </defs>
  
  <circle cx="32" cy="32" r="6" fill="url(#coreGradient)">
    <animate attributeName="r" values="5;7;5" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="32" cy="32" r="14" fill="none" stroke="url(#orbitGradient)" stroke-width="1" stroke-dasharray="3 2">
    <animateTransform attributeName="transform" type="rotate" from="0 32 32" to="360 32 32" dur="20s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="32" cy="32" r="22" fill="none" stroke="url(#orbitGradient)" stroke-width="0.8" stroke-dasharray="2 3">
    <animateTransform attributeName="transform" type="rotate" from="360 32 32" to="0 32 32" dur="30s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="32" cy="32" r="30" fill="none" stroke="url(#orbitGradient)" stroke-width="0.5" stroke-dasharray="1 4">
    <animateTransform attributeName="transform" type="rotate" from="0 32 32" to="360 32 32" dur="45s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="46" cy="32" r="2" fill="#a78bfa">
    <animateTransform attributeName="transform" type="rotate" from="0 32 32" to="360 32 32" dur="20s" repeatCount="indefinite"/>
  </circle>
  
  <circle cx="54" cy="32" r="1.5" fill="#22d3ee">
    <animateTransform attributeName="transform" type="rotate" from="360 32 32" to="0 32 32" dur="30s" repeatCount="indefinite"/>
  </circle>
</svg>