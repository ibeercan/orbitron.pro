<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Orbitron</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <canvas id="starfield"></canvas>
    <canvas id="shooting-stars"></canvas>
    
    <main class="content">
        <div class="logo">
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="coreGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#818cf8"/>
                        <stop offset="100%" stop-color="#22d3ee"/>
                    </linearGradient>
                    <linearGradient id="orbitGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                        <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.7"/>
                        <stop offset="50%" stop-color="#22d3ee" stop-opacity="0.9"/>
                        <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.7"/>
                    </linearGradient>
                    <filter id="glow">
                        <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
                        <feMerge>
                            <feMergeNode in="coloredBlur"/>
                            <feMergeNode in="SourceGraphic"/>
                        </feMerge>
                    </filter>
                </defs>
                
                <circle cx="50" cy="50" r="8" fill="url(#coreGradient)" filter="url(#glow)">
                    <animate attributeName="r" values="7;9;7" dur="3s" repeatCount="indefinite"/>
                </circle>
                
                <circle cx="50" cy="50" r="20" fill="none" stroke="url(#orbitGradient)" stroke-width="1.2" stroke-dasharray="4 3">
                    <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="25s" repeatCount="indefinite"/>
                </circle>
                
                <circle cx="50" cy="50" r="32" fill="none" stroke="url(#orbitGradient)" stroke-width="1" stroke-dasharray="3 4">
                    <animateTransform attributeName="transform" type="rotate" from="360 50 50" to="0 50 50" dur="40s" repeatCount="indefinite"/>
                </circle>
                
                <circle cx="50" cy="50" r="44" fill="none" stroke="url(#orbitGradient)" stroke-width="0.6" stroke-dasharray="2 5">
                    <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="60s" repeatCount="indefinite"/>
                </circle>
                
                <circle cx="70" cy="50" r="3" fill="#a78bfa" filter="url(#glow)">
                    <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="25s" repeatCount="indefinite"/>
                </circle>
                
                <circle cx="82" cy="50" r="2" fill="#22d3ee" filter="url(#glow)">
                    <animateTransform attributeName="transform" type="rotate" from="360 50 50" to="0 50 50" dur="40s" repeatCount="indefinite"/>
                </circle>
            </svg>
        </div>
        
        <h1 class="title">Продолжение следует</h1>
        <p class="subtitle">Что-то готовится. Оставайтесь на связи.</p>
    </main>
    
    <footer class="footer">
        <div class="footer-content">
            <div class="footer-brand">
                <span class="brand-name">ORBITRON</span>
                <span class="brand-year">2026</span>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
