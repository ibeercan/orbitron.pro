services:
  orbitron-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: orbitron-backend
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - AI_API_KEY=${AI_API_KEY}
      - AI_BASE_URL=${AI_BASE_URL}
      - AI_MODEL=${AI_MODEL}
      - REDIS_URL=${REDIS_URL}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.orbitron-backend.rule=Host(`api.orbitron.pro`)"
      - "traefik.http.services.orbitron-backend.loadbalancer.server.port=8000"
    depends_on:
      - postgres
      - redis

  orbitron-frontend:
    image: nginx:alpine
    container_name: orbitron-frontend
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/nginx.conf:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.orbitron-frontend.rule=Host(`orbitron.pro`)"
      - "traefik.http.routers.orbitron-frontend.entrypoints=websecure"
      - "traefik.http.routers.orbitron-frontend.tls=true"
      - "traefik.http.routers.orbitron-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.orbitron-frontend.loadbalancer.server.port=80"
    networks:
      - proxy
    restart: unless-stopped

  postgres:
    image: postgres:15
    container_name: orbitron-postgres
    environment:
      POSTGRES_DB: astrology
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: orbitron-redis

volumes:
  postgres_data:

networks:
  proxy:
    external: true