services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: orbitron-backend
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - POSTGRES_DB=${POSTGRES_DB:-astrology}
      - POSTGRES_USER=${POSTGRES_USER:-user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY is required}
      - AI_PROVIDERS=${AI_PROVIDERS:-[]}
      - AI_CACHE_ENABLED=${AI_CACHE_ENABLED:-true}
      - AI_CACHE_TTL_SECONDS=${AI_CACHE_TTL_SECONDS:-21600}
      - AI_TOKEN_TRACKING_ENABLED=${AI_TOKEN_TRACKING_ENABLED:-true}
      - AI_COST_PER_1M_INPUT_RUB=${AI_COST_PER_1M_INPUT_RUB:-300.0}
      - AI_COST_PER_1M_OUTPUT_RUB=${AI_COST_PER_1M_OUTPUT_RUB:-600.0}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-Orbitron <noreply@orbitron.pro>}
      - FRONTEND_URL=${FRONTEND_URL:-https://orbitron.pro}
      - COOKIE_DOMAIN=${COOKIE_DOMAIN:-orbitron.pro}
      - COOKIE_SECURE=${COOKIE_SECURE:-true}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - RUN_MIGRATIONS=${RUN_MIGRATIONS:-true}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://orbitron.pro,https://api.orbitron.pro}
      - FREE_AI_REQUESTS_PER_MONTH=${FREE_AI_REQUESTS_PER_MONTH:-3}
      - FREE_CHARTS_LIMIT=${FREE_CHARTS_LIMIT:-1}
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.backend.rule=Host(`api.orbitron.pro`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.backend.middlewares=security-headers@docker"
      - "traefik.http.services.backend.loadbalancer.server.port=8000"
    networks:
      - proxy
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: orbitron-frontend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`orbitron.pro`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.frontend.middlewares=security-headers@docker"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  postgres:
    image: public.ecr.aws/docker/library/postgres:15-alpine
    container_name: orbitron-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-astrology}
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-astrology}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    image: public.ecr.aws/docker/library/redis:7-alpine
    container_name: orbitron-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  proxy:
    external: true
  internal:
    driver: bridge
    name: orbitron-internal